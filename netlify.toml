[build]
  publish = "public"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/patches"
  to = "/.netlify/functions/get-patches"
  status = 200

[[redirects]]
  from = "/api/admin/patches"
  to = "/.netlify/functions/post-patches"
  status = 200

# Prevent direct directory listing of admin
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    X-Frame-Options = "DENY"
